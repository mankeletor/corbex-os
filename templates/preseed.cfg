# ============================================
# ARCHIVO PRESEED PARA CORBEX OS
# Hardware: Notebooks escolares Intel + 4GB RAM
# Versión: REFACTORIZADA (CDROM prioritario)
# ============================================

d-i preseed/early_command string \
    rm -f /target/etc/apt/apt.conf.d/01autoremove 2>/dev/null || true; \
    if [ -f /usr/lib/apt-setup/generators/00cdrom ]; then \
        printf '#!/bin/sh\nexit 0\n' > /usr/lib/apt-setup/generators/00cdrom; \
        chmod +x /usr/lib/apt-setup/generators/00cdrom; \
    fi


# Silenciar el instalador
d-i debian-installer/priority high
d-i debian-installer/allow_unauthenticated boolean true
d-i debian-installer/quiet boolean true
d-i debian-installer/splash boolean false

# Evitar prompt de firmware propietario (crucial para bare metal)
d-i hw-detect/load_firmware boolean true
d-i hw-detect/prompt_firmware boolean false

# --------------------
# IDIOMA Y LOCALIZACIÓN
# --------------------
d-i debian-installer/language string es
d-i debian-installer/country string AR
d-i debian-installer/locale string es_AR.UTF-8
d-i keyboard-configuration/xkb-keymap select es
d-i keyboard-configuration/layoutcode string es
d-i keyboard-configuration/modelcode string pc105
d-i console-setup/ask_detect boolean false
d-i console-setup/layoutcode string es
d-i clock-setup/utc boolean true
d-i time/zone string America/Argentina/Cordoba
d-i clock-setup/ntp boolean false

# --------------------
# CONFIGURACIÓN DE RED (HARDENED)
# --------------------
d-i netcfg/enable boolean true
d-i netcfg/choose_interface select auto
d-i netcfg/dhcp_timeout string 5
d-i netcfg/dhcp_failed note
d-i netcfg/dhcp_options select Configure network manually

# Prevenir errores de WiFi (contraseña demasiado larga/corta)
d-i netcfg/wireless_wpa string
d-i netcfg/wireless_essid string
d-i netcfg/wireless_security_type select none

# --------------------
# REPOSITORIOS (CDROM PRIORITARIO + MIRROR FIJO)
# --------------------
# Componentes a habilitar
d-i apt-setup/components string main contrib non-free non-free-firmware

# REPOSITORIO LOCAL (PRIORIDAD MÁXIMA - SERÁ EL PRIMERO)
d-i apt-setup/local0/repository string \
    deb file:///cdrom excalibur main contrib non-free non-free-firmware local
d-i apt-setup/local0/comment string "CorbexOS Local Repo"
d-i apt-setup/local0/source boolean false

# 1. Forzar el protocolo y evitar detección automática
d-i mirror/country string manual
d-i mirror/protocol string http
d-i mirror/http/hostname string dev1mir.registrationsplus.net
d-i mirror/http/directory string /devuan/merged
d-i mirror/suite string excalibur
d-i mirror/codename string excalibur

# 2. Priorizar Repo Local (No forzar mirror online en la instalación)
d-i apt-setup/use_mirror boolean false
d-i apt-setup/no_mirror boolean true
d-i apt-setup/mirror/error select Continue

# 3. Habilitar componentes adicionales del repo local
d-i apt-setup/non-free boolean true
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/contrib boolean true

# 4. Evitar que pregunte por otro CD/DVD (Asegura uso del local0)
d-i apt-setup/cdrom/set-first boolean true
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-failed boolean false

# Evitar que el instalador se detenga si el mirror falla
d-i apt-setup/mirror/error select Continue

# --------------------
# LIMPIEZA DE DISCOS Y PARTICIONES (AUTOMATIZADO)
# --------------------
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

# Autoparticionado (Usa el disco entero)
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic

# Confirmaciones automáticas (Peligro: Borra todo el disco)
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# --------------------
# SELECCIÓN DE INIT SYSTEM (OPENRC)
# --------------------
d-i choose-init/choose_init select openrc
d-i choose-init/choose_init seen true


# --------------------
# SELECCIÓN DE SOFTWARE
# --------------------
tasksel tasksel/desktop multiselect mate-desktop
tasksel tasksel/first multiselect mate-desktop
d-i tasksel/display-first boolean false
d-i pkgsel/upgrade select none

# Inyección de paquetes (desde pkgs_manual.txt)
d-i pkgsel/include string vim-tiny rsyslog __PAQUETES__

# --------------------
# OPCIONES DE KERNEL
# --------------------
d-i debian-installer/add-kernel-opts string init=/sbin/openrc-init loglevel=3 mitigations=off

# --------------------
# CREACIÓN DE USUARIO
# --------------------
d-i passwd/user-fullname string Alumno Corbex
d-i passwd/username string alumno
d-i passwd/user-password-crypted password $6$6F7GAKxYmmdlAo.y$jHoKIGaEBAO9R5sEl7ukiWjo3q07NnahOVqm3gE/xd1if/Y/oIcaSCuMdcUqYC6IS0O0oe2IWt9DtPYdtrKzt1
d-i passwd/root-login boolean true
d-i passwd/root-password-crypted password $6$ZuvV0rr10C0m1oTQ$0nOvwGAOjNUxBRItm1cxlx8GfssJGTXT6hCfmVHwI7JSRFkg.VeqLL6nEObYoXJDQwn57PsG8SgIOpMQwDfwy.

# --------------------
# CONFIGURACIÓN DE GRUB
# --------------------
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default
d-i grub-installer/force-efi-extra-removable boolean true
d-i grub-installer/update-nvram boolean true

# --------------------
# POST-INSTALACIÓN (EJECUCIÓN DIRECTA)
# --------------------
d-i preseed/late_command string \
    cp -r /cdrom/extras /target/root/extras || true; \
    cp /rc.conf /target/etc/rc.conf || true; \
    cp /postinst.sh /target/root/postinst.sh || true; \
    cp /pkgs_install.txt /target/root/pkgs_install.txt || true; \
    cp /corbex.dconf /target/root/corbex.dconf || true; \
    chmod +x /target/root/postinst.sh || true; \
    mkdir -p /target/usr/local/sbin || true; \
    cp /corbex-build-sources.sh /target/usr/local/sbin/corbex-build-sources.sh || true; \
    chmod +x /target/usr/local/sbin/corbex-build-sources.sh || true; \
    in-target /root/postinst.sh

# --------------------
# FINALIZACIÓN
# --------------------
d-i finish-install/reboot_in_progress note