# templates/syslinux_efi.cfg
# ------------------------------------------------------------------
# Config de Syslinux-EFI para CorbexOS
# PURPOSE: Reemplaza /boot/isolinux/syslinux.cfg DENTRO del efi.img
#
# Cadena de carga UEFI:
#   BOOTX64.EFI
#     └─ EFI/BOOT/syslinux.cfg  (NO tocar — redirige acá)
#          └─ /boot/isolinux/syslinux.cfg  ← ESTE ARCHIVO
#
# NOTA: No uses SAY, SPLASH ni DEFAULT sin vesamenu.c32 en UEFI.
#       Los módulos .c32 están en /EFI/BOOT/ (path del EFI/BOOT/syslinux.cfg),
#       pero una vez que se hace el "config" redirect el path pasa a /boot/isolinux/.
#       Por eso usamos rutas absolutas en kernel/append.
# ------------------------------------------------------------------

path /boot/isolinux
noescape 1
prompt 0
timeout 40
ui vesamenu.c32
default corbex-auto

label corbex-auto
  menu label Instalacion Automatica CorbexOS
  kernel /boot/isolinux/linux
  append vga=788 initrd=/boot/isolinux/initrd.gz preseed/file=/cdrom/preseed.cfg auto=true priority=critical cdrom-detect/try-usb=true -- quiet

label corbex-manual
  menu label Instalacion Manual (Expert Mode)
  kernel /boot/isolinux/linux
  append vga=788 initrd=/boot/isolinux/initrd.gz preseed/file=/cdrom/preseed.cfg priority=high cdrom-detect/try-usb=true -- quiet
